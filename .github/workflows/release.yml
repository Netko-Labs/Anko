name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-release:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check commit message for release
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "$COMMIT_MSG" =~ ^🚀[[:space:]]release:[[:space:]]*(v[0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Detected release commit for version: $VERSION"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Not a release commit"
          fi

  lint-and-typecheck:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run tsc --noEmit

  generate-changelog:
    needs: [check-release, lint-and-typecheck]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    outputs:
      changelog: ${{ steps.ai.outputs.text }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Get commit log
        id: commits
        run: |
          if [ -n "${{ steps.prev_tag.outputs.tag }}" ]; then
            COMMITS=$(git log ${{ steps.prev_tag.outputs.tag }}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get release date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Generate changelog with AI
        id: ai
        uses: vercel/ai-action@v2
        with:
          api-key: ${{ secrets.AI_GATEWAY_API_KEY }}
          model: anthropic/claude-haiku-4-5
          system: |
            You are a changelog generator for Anko, a SQL desktop client application.
            Your personality: A friendly geek who loves anime, gaming, and tech culture.
            Write changelogs that are fun, witty, and sprinkled with clever puns or references.
            Keep it lighthearted but informative - users should smile while learning what's new.
            Avoid being cringe or trying too hard. Natural humor > forced jokes.
          prompt: |
            Generate a changelog entry for version ${{ needs.check-release.outputs.version }} released on ${{ steps.date.outputs.date }}.

            Commits since last release (using conventional commits with emojis):
            ${{ steps.commits.outputs.commits }}

            Commit type mapping:
            - ✨ feat = New Features (the good stuff!)
            - 🐛 fix = Bug Fixes (squashed bugs)
            - ⚡ perf = Performance (speed boosts)
            - 🔒 security = Security (patches)
            - ♻️ refactor, 💄 style, 🔧 chore = Under the Hood

            Format as markdown:
            ## [${{ needs.check-release.outputs.version }}] - ${{ steps.date.outputs.date }}

            ### Highlights
            (1-2 fun sentences about the coolest changes - hook the reader!)

            ### New Features ✨
            (from ✨ feat commits - make them sound exciting)

            ### Improvements ⚡
            (from ⚡ perf commits and notable refactors)

            ### Bug Fixes 🐛
            (from 🐛 fix commits - celebrate the squashed bugs)

            ### Security 🔒
            (from 🔒 security commits, if any)

            Style guidelines:
            - Be witty but not forced - natural humor wins
            - Occasional puns welcome (database puns, anime references, gaming terms)
            - Keep descriptions clear despite the fun tone
            - Only include sections that have changes
            - Skip 📝 docs, 👷 ci, 🔧 chore unless notable
            - Use present tense ("Add" not "Added")
            - Don't include commit hashes in output
            - You can use emojis sparingly for flair

            Output ONLY the markdown, nothing else.

      - name: Update CHANGELOG.md
        run: |
          # Create temp file with new changelog entry
          echo "${{ steps.ai.outputs.text }}" > new_entry.md
          echo "" >> new_entry.md

          # Insert after the marker
          sed -i '/<!-- CHANGELOG_INSERT_MARKER -->/r new_entry.md' CHANGELOG.md

          rm new_entry.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update changelog for ${{ needs.check-release.outputs.version }}" || echo "No changes to commit"
          git push origin HEAD:main || echo "Nothing to push"

      - name: Create and push tag
        run: |
          git tag ${{ needs.check-release.outputs.version }}
          git push origin ${{ needs.check-release.outputs.version }}

  create-release:
    needs: [check-release, generate-changelog]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-release.outputs.version }}
          draft: true
          body: ${{ needs.generate-changelog.outputs.changelog }}

  build:
    needs: [check-release, create-release]
    if: needs.check-release.outputs.should_release == 'true'
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bun run build

      - name: Build native drag library
        run: bun run build:native

      - name: Build Electrobun app
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          ELECTROBUN_APPLEID: ${{ secrets.APPLE_ID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.APPLE_PASSWORD }}
          ELECTROBUN_TEAMID: ${{ secrets.APPLE_TEAM_ID }}
        run: bunx electrobun build --env=stable

      - name: Upload artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d artifacts ] && ls artifacts/* 1>/dev/null 2>&1; then
            for file in artifacts/*; do
              [ -f "$file" ] && gh release upload ${{ needs.check-release.outputs.version }} "$file" --repo ${{ github.repository }} --clobber
            done
          else
            echo "::error::No artifacts found in artifacts/ directory"
            exit 1
          fi

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

  publish-release:
    needs: [check-release, create-release, build]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            })
